<div class="auth-wrapper py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card auth-card p-4">
          <div class="text-center mb-4">
            <i class="bi bi-key fs-1 text-warning"></i>
            <h2 class="mt-2 fw-bold">Recuperar Contraseña</h2>
            <p class="text-muted small">Ingresa tu correo y te enviaremos las instrucciones</p>
          </div>

          @if (mensaje) {
            <div class="alert alert-info d-flex align-items-center gap-2">
              <i class="bi bi-info-circle-fill"></i> {{ mensaje }}
            </div>
          }

          @if (!mensaje) {
            <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-4">
                <label class="form-label fw-semibold"
                  >Correo electrónico <span class="text-danger">*</span></label
                >
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input
                    type="email"
                    class="form-control"
                    formControlName="email"
                    [class.is-invalid]="f['email'].invalid && f['email'].touched"
                    [class.is-valid]="f['email'].valid && f['email'].touched"
                    placeholder="correo@ejemplo.com"
                  />
                  <div class="invalid-feedback">
                    @if (f['email'].errors?.['required']) {
                      El correo es obligatorio.
                    } @else if (f['email'].errors?.['email']) {
                      Ingresa un correo válido.
                    }
                  </div>
                </div>
              </div>
              <button
                type="submit"
                class="btn btn-warning w-100 py-2 fw-semibold"
                [disabled]="loading"
              >
                @if (loading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                Enviar instrucciones
              </button>
            </form>
          }

          <hr />
          <p class="text-center small mb-0">
            <a routerLink="/login" class="text-decoration-none"
              ><i class="bi bi-arrow-left me-1"></i>Volver al login</a
            >
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
